  <text x="307" y="497" font-family="'Courier New', monospace" font-size="10" fill="#7a7870" letter-spacing="1" text-anchor="middle">AWS</text>

  <rect x="346" y="480" width="54" height="26" fill="none" stroke="#2a2a27" stroke-width="1"/>
  <text x="373" y="497" font-family="'Courier New', monospace" font-size="10" fill="#7a7870" letter-spacing="1" text-anchor="middle">RAG</text>

  <rect x="412" y="480" width="76" height="26" fill="none" stroke="#2a2a27" stroke-width="1"/>
  <text x="450" y="497" font-family="'Courier New', monospace" font-size="10" fill="#7a7870" letter-spacing="1" text-anchor="middle">DJANGO</text>

